<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PITWALL — F1 Race Weekend Companion</title>
  <meta name="description" content="Your complete Formula 1 companion. Live race data, weekend analysis, circuit encyclopedia, driver profiles, constructor history, and F1 history since 1950." />

  <!-- Favicon (optional — add your own or remove) -->
  <!-- <link rel="icon" href="favicon.ico" /> -->

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- React 18 + ReactDOM (UMD, CDN — no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Recharts (must load before app scripts so window.Recharts is available) -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- Babel Standalone (compiles JSX in-browser — keep last in head or before body scripts) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- React mounts here -->
  <div id="root"></div>

  <!-- App scripts — order matters: utils → encyclopedia → companion → app -->
  <script type="text/babel" src="js/utils.js"></script>
  <script type="text/babel" src="js/encyclopedia.js"></script>
  <script type="text/babel" src="js/companion_components.js"></script>
  <script type="text/babel" src="js/app.js"></script>

  <!-- Mount React root — must run after all component scripts above -->
  <script type="text/babel">
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
