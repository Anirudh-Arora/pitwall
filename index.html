<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PITWALL — F1 Race Weekend Companion</title>
  <meta name="description" content="Your complete Formula 1 companion. Live race data, weekend analysis, circuit encyclopedia, driver profiles, constructor history, and F1 history since 1950." />

  <!-- Preconnect cuts DNS + TCP handshake time for external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://unpkg.com" />

  <!-- Fonts: display=swap renders text immediately in fallback font, no invisible text during load -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" />

  <!-- App stylesheet -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- React 18 + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Recharts — must be present before companion_components.js parses -->
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- Babel Standalone — only needed for companion_components.js (the one file with real JSX).
       utils.js, encyclopedia.js, and app.js all use React.createElement() directly
       so they load as plain scripts — no Babel tax for them. -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <!-- React mounts here -->
  <div id="root"></div>

  <!--
    Load order:
      1. utils.js                — CIRCUITS, DRIVERS, API helpers (no JSX)
      2. encyclopedia.js         — Circuits/Drivers/Constructors/History pages (no JSX)
      3. companion_components.js — Live + Weekend (has JSX, needs Babel)
      4. app.js                  — Router + home page (no JSX)
      5. mount script            — ReactDOM.createRoot
  -->
  <script src="js/utils.js"></script>
  <script src="js/encyclopedia.js"></script>
  <script type="text/babel" data-presets="react" src="js/companion_components.js"></script>
  <script src="js/app.js"></script>

  <script>
    const _root = ReactDOM.createRoot(document.getElementById('root'));
    _root.render(React.createElement(App));
  </script>

</body>
</html>
