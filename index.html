<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PITWALL — F1 Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="js/utils.js"></script>
<script type="text/babel" src="js/companion_components.js"></script>
<script type="text/babel" src="js/encyclopedia.js"></script>
<script type="text/babel" src="js/app.js"></script>

<script type="text/babel">
// ═══════════════════════════════════════════════════════════════
// WEEKEND / LIVE SECTION — wrapper that embeds the full companion
// ═══════════════════════════════════════════════════════════════

// These are the two section components that wire the companion
// components into the new nav shell.

function WeekendSection() {
  const { useState, useEffect, useCallback, useMemo, useRef } = React;

  // ── All state from original companion App ──
  const [mode, setMode] = useState('prerace');
  const [selectedMeeting, setSelectedMeeting] = useState(null);
  const [selectedSession, setSelectedSession] = useState(null);
  const [raceSession, setRaceSession] = useState(null);
  const [practiceSession, setPracticeSession] = useState(null);
  const [preTab, setPreTab] = useState('laptime');
  const [liveTab, setLiveTab] = useState('timing');

  const [meetings, setMeetings] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [drivers, setDrivers] = useState([]);
  const [allDriverLaps, setAllDriverLaps] = useState({});
  const [stints, setStints] = useState([]);
  const [qualiLaps, setQualiLaps] = useState([]);
  const [qualiSession, setQualiSession] = useState(null);
  const [raceResults, setRaceResults] = useState([]);
  const [loadingRaceResults, setLoadingRaceResults] = useState(false);

  const [weekendSessionsLaps, setWeekendSessionsLaps] = useState([]);
  const [weekendStints, setWeekendStints] = useState([]);
  const [weekendDataReady, setWeekendDataReady] = useState(false);
  const [weekendDataLoading, setWeekendDataLoading] = useState(false);
  const [aiDataSources, setAiDataSources] = useState([]);

  const [loadingMeetings, setLoadingMeetings] = useState(true);
  const [loadingLaps, setLoadingLaps] = useState(false);
  const [loadingStints, setLoadingStints] = useState(false);
  const [loadingQuali, setLoadingQuali] = useState(false);
  const [errorLaps, setErrorLaps] = useState(null);

  const [groqKey, setGroqKey] = useState('');
  const [groqKeySet, setGroqKeySet] = useState(false);
  const [owmKey, setOwmKey] = useState('');
  const [predictions, setPredictions] = useState([]);
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState(null);
  const [liveProbs, setLiveProbs] = useState([]);
  const [liveUpdating, setLiveUpdating] = useState(false);
  const [liveUpdateError, setLiveUpdateError] = useState(null);

  const [liveEnabled, setLiveEnabled] = useState(false);

  // ── Re-use all effects and logic from companion ──
  // Step 1: Load meetings
  useEffect(() => {
    setLoadingMeetings(true);
    const year = new Date().getFullYear();
    fetchF1('/meetings', { year })
      .then(data => data?.length ? data : fetchF1('/meetings', { year: 2025 }))
      .then(data => {
        const now = new Date();
        const sorted = (data||[]).filter(m=>m.meeting_key).sort((a,b)=>new Date(a.date_start)-new Date(b.date_start));
        const past = sorted.filter(m=>new Date(m.date_start)<=now);
        const upcoming = sorted.filter(m=>new Date(m.date_start)>now);
        const shown = [...past, ...(upcoming.length?[upcoming[0]]:[])];
        setMeetings(shown);
        const def = past.length ? past[past.length-1] : shown[0];
        if (def) setSelectedMeeting(def);
        setLoadingMeetings(false);
      }).catch(() => setLoadingMeetings(false));
  }, []);

  // Step 2: Load sessions + weekend data
  useEffect(() => {
    if (!selectedMeeting) return;
    setRaceResults([]); setQualiLaps([]); setAllDriverLaps({}); setDrivers([]);
    setWeekendSessionsLaps([]); setWeekendStints([]); setWeekendDataReady(false);
    setPredictions([]); setLiveProbs([]); setAiDataSources([]);
    setPreTab('laptime');

    fetchF1('/sessions', { meeting_key: selectedMeeting.meeting_key }).then(async data => {
      setSessions(data);
      const quali = data.find(s=>s.session_type==='Qualifying'||s.session_name?.toLowerCase().includes('qualif'));
      const race  = data.find(s=>s.session_type==='Race'||s.session_name?.toLowerCase()==='race');
      const fp    = data.filter(s=>s.session_type==='Practice'||s.session_name?.toLowerCase().includes('practice')||s.session_name?.toLowerCase().includes('day')).sort((a,b)=>new Date(a.date_start)-new Date(b.date_start));
      if (quali) setQualiSession(quali);
      const fpForCircuit = fp.find(s=>s.session_name?.toLowerCase().includes('practice 2'))||fp[fp.length-1];
      if (fpForCircuit) setPracticeSession(fpForCircuit);
      if (race) {
        setRaceSession(race);
        setLoadingRaceResults(true);
        Promise.all([
          fetchF1('/drivers',{session_key:race.session_key}).catch(()=>[]),
          fetchF1('/position',{session_key:race.session_key}).catch(()=>[])
        ]).then(([drvs,pos])=>{
          if (pos?.length) {
            const fp2={};
            pos.forEach(p=>{if(!fp2[p.driver_number]||p.date>fp2[p.driver_number].date)fp2[p.driver_number]=p;});
            const dm={};drvs.forEach(d=>{dm[d.driver_number]=d;});
            setRaceResults(Object.values(fp2).sort((a,b)=>a.position-b.position).map(p=>({...p,driver:dm[p.driver_number]})));
          }
          setLoadingRaceResults(false);
        }).catch(()=>setLoadingRaceResults(false));
      }
      const best = quali||fp[fp.length-1]||data[0];
      if (best) setSelectedSession(best);

      const sessForAI = [...fp, ...(quali?[quali]:[])];
      if (sessForAI.length) {
        setWeekendDataLoading(true);
        const baseSess = sessForAI[sessForAI.length-1];
        fetchF1('/drivers',{session_key:baseSess.session_key}).then(d=>setDrivers(d)).catch(()=>{});
        Promise.all(sessForAI.map(async s => {
          try {
            const [laps,sts] = await Promise.all([fetchF1('/laps',{session_key:s.session_key}),fetchF1('/stints',{session_key:s.session_key})]);
            const valid=laps.filter(l=>l.lap_duration>0).map(l=>l.lap_duration).filter(isFinite);
            if (!valid.length) return null;
            const best=Math.min(...valid);
            const byDriver={};
            laps.forEach(l=>{if(!byDriver[l.driver_number])byDriver[l.driver_number]=[];byDriver[l.driver_number].push(l);});
            const cleaned={};
            Object.entries(byDriver).forEach(([num,dl])=>{cleaned[num]=cleanLaps(dl,best);});
            return { sessionName:s.session_name, sessionKey:s.session_key, lapsByDriver:cleaned, stints:sts };
          } catch { return null; }
        })).then(results => {
          const valid=results.filter(Boolean);
          setWeekendSessionsLaps(valid.map(r=>({sessionName:r.sessionName,lapsByDriver:r.lapsByDriver})));
          setWeekendStints(valid.flatMap(r=>r.stints));
          setWeekendDataReady(true);
          setWeekendDataLoading(false);
          setAiDataSources(valid.map(r=>r.sessionName));
          if (valid.length) setAllDriverLaps(valid[valid.length-1].lapsByDriver);
        }).catch(()=>setWeekendDataLoading(false));
      }
    }).catch(()=>{});
  }, [selectedMeeting]);

  // Step 3: Per-session lap view
  useEffect(() => {
    if (!selectedSession) return;
    setLoadingLaps(true); setErrorLaps(null);
    const sessionEnd = selectedSession.date_end ? new Date(selectedSession.date_end) : null;
    if (sessionEnd && sessionEnd > new Date()) {
      setAllDriverLaps({}); setLoadingLaps(false); setErrorLaps(null); return;
    }
    Promise.all([
      fetchF1('/drivers',{session_key:selectedSession.session_key}).catch(()=>[]),
      fetchF1('/laps',{session_key:selectedSession.session_key}).catch(()=>[])
    ]).then(([drvs,laps]) => {
      if (drvs.length) setDrivers(drvs);
      if (!laps.length) { setAllDriverLaps({}); setLoadingLaps(false); return; }
      const valid=laps.filter(l=>l.lap_duration>0).map(l=>l.lap_duration).filter(isFinite);
      const best=valid.length?Math.min(...valid):100;
      const byDriver={};
      laps.forEach(l=>{if(!byDriver[l.driver_number])byDriver[l.driver_number]=[];byDriver[l.driver_number].push(l);});
      const cleaned={};
      Object.entries(byDriver).forEach(([num,dl])=>{cleaned[num]=cleanLaps(dl,best);});
      setAllDriverLaps(cleaned);
      setLoadingLaps(false);
    }).catch(()=>{setAllDriverLaps({}); setLoadingLaps(false);});
  }, [selectedSession]);

  // Stints
  useEffect(() => {
    if (!selectedSession) return;
    setLoadingStints(true);
    fetchF1('/stints',{session_key:selectedSession.session_key})
      .then(d=>{setStints(d||[]);setLoadingStints(false);})
      .catch(()=>setLoadingStints(false));
  }, [selectedSession]);

  // Quali laps
  useEffect(() => {
    if (!qualiSession) return;
    setLoadingQuali(true);
    fetchF1('/laps',{session_key:qualiSession.session_key})
      .then(d=>{setQualiLaps(d||[]);setLoadingQuali(false);})
      .catch(()=>{setQualiLaps([]);setLoadingQuali(false);});
  }, [qualiSession]);

  // Live poll hook
  const live = useLivePoll(raceSession?.session_key, liveEnabled);

  const driverMap = useMemo(()=>{ const m={}; drivers.forEach(d=>{m[d.driver_number]=d;}); return m; }, [drivers]);
  const driverList = useMemo(()=>Object.keys(allDriverLaps).map(Number), [allDriverLaps]);

  // AI handlers
  const handleGroqKey = () => { if (groqKey.trim().startsWith('gsk_')) setGroqKeySet(true); };
  const runAI = async () => {
    if (!groqKeySet||!weekendDataReady) return;
    setAiLoading(true); setAiError(null);
    try {
      const snap = buildWeekendSnapshot(weekendSessionsLaps, weekendStints, qualiLaps, drivers);
      const preds = await callGroqPreRace(groqKey, snap, selectedMeeting?.meeting_name||'');
      setPredictions(preds);
    } catch(e) { setAiError(e.message); }
    setAiLoading(false);
  };
  const runLiveUpdate = async () => {
    if (!groqKeySet||!predictions.length) return;
    setLiveUpdating(true); setLiveUpdateError(null);
    try {
      const snap = buildLiveSnapshot(live.positions, live.intervals, live.stints, driverMap, live.liveLaps);
      const updates = await callGroqLiveUpdate(groqKey, predictions, snap, selectedMeeting?.meeting_name||'');
      setLiveProbs(updates);
    } catch(e) { setLiveUpdateError(e.message); }
    setLiveUpdating(false);
  };

  // ─── RENDER ─────────────────────────────────────────────────
  // This is the full pre-race + live view from the original companion
  // We render it inline here, wired to the new nav shell above.

  const sessionYear = selectedSession?.date_start ? new Date(selectedSession.date_start).getFullYear() : new Date().getFullYear();

  return (
    <div>
      {/* Meeting picker */}
      <div style={{marginBottom:'16px'}}>
        <div className="card-title" style={{marginBottom:'10px'}}>Select Race Weekend</div>
        {loadingMeetings
          ? <div className="loading-state"><div className="spin"/>Loading calendar…</div>
          : <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
              {meetings.map(m=>(
                <div key={m.meeting_key} className={`mtg-card ${selectedMeeting?.meeting_key===m.meeting_key?'selected':''}`}
                  onClick={()=>setSelectedMeeting(m)}>
                  <div className="mtg-card-name">{m.meeting_name}</div>
                  <div className="mtg-card-loc">{m.location}</div>
                </div>
              ))}
            </div>
        }
      </div>

      {selectedMeeting && (
        <>
          {/* Mode toggle + session tabs */}
          <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px',flexWrap:'wrap'}}>
            <div className="mode-toggle">
              <button className={`mode-btn ${mode==='prerace'?'on':''}`} onClick={()=>setMode('prerace')}>Pre-Race</button>
              <button className={`mode-btn ${mode==='live'?'on':''}`} onClick={()=>setMode('live')}>Live Race</button>
            </div>
            <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
              {sessions.map(s=>(
                <div key={s.session_key} className={`sess-tab ${selectedSession?.session_key===s.session_key?'on':''}`}
                  onClick={()=>setSelectedSession(s)}>
                  {s.session_name}
                </div>
              ))}
            </div>
            {weekendDataLoading && <div style={{display:'flex',alignItems:'center',gap:'6px',fontFamily:'var(--font-display)',fontSize:'10px',letterSpacing:'2px',color:'var(--text-muted)'}}><div className="spin"/>Loading sessions…</div>}
            {weekendDataReady && <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>{aiDataSources.map(s=><span key={s} className="badge badge-green">{s}</span>)}</div>}
          </div>

          {/* PRE-RACE MODE */}
          {mode==='prerace' && (
            <div className="two-col" style={{alignItems:'start'}}>
              <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
                <div className="card">
                  <div className="tabs">
                    {[['laptime','Lap Times'],['sectors','Sectors'],['tyres','Tyres'],['h2h','Head-to-Head'],['progression','Pace Progression'],['ratings','Performance Ratings'],['race','Race Result']].map(([k,l])=>(
                      <button key={k} className={`tab-btn ${preTab===k?'active':''}`} onClick={()=>setPreTab(k)}>{l}</button>
                    ))}
                  </div>
                  {loadingLaps
                    ? <div className="loading-state"><div className="spin"/>Loading lap data…</div>
                    : preTab==='laptime' ? <LapTimeChart allDriverLaps={allDriverLaps} drivers={drivers}/>
                    : preTab==='sectors' ? <SectorAnalysis allDriverLaps={allDriverLaps} drivers={drivers}/>
                    : preTab==='tyres'   ? <TyreStrategy stints={stints} drivers={drivers} loading={loadingStints}/>
                    : preTab==='h2h'     ? <HeadToHead allDriverLaps={allDriverLaps} weekendSessionsLaps={weekendSessionsLaps} drivers={drivers}/>
                    : preTab==='progression' ? (weekendDataReady?<PaceProgression weekendSessionsLaps={weekendSessionsLaps} drivers={drivers}/>:<div className="loading-state"><div className="spin"/>Loading session data…</div>)
                    : preTab==='ratings' ? (weekendDataReady?<PerformanceRatings weekendSessionsLaps={weekendSessionsLaps} qualiLaps={qualiLaps} drivers={drivers}/>:<div className="loading-state"><div className="spin"/>Loading session data…</div>)
                    : preTab==='race'    ? <RaceResults results={raceResults} loading={loadingRaceResults}/>
                    : null
                  }
                </div>
                <div className="card">
                  <QualiResults qualiLaps={qualiLaps} drivers={drivers} loading={loadingQuali}/>
                </div>
              </div>

              {/* AI Panel */}
              <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
                <div className="card">
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
                    <div className="card-title" style={{margin:0}}>AI Race Analyst</div>
                    <div style={{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}}>
                      {!qualiLaps.length && weekendDataReady && (
                        <span className="badge badge-amber" style={{fontSize:'8px'}}>PRACTICE ONLY</span>
                      )}
                    </div>
                  </div>
                  {!groqKeySet ? (
                    <div>
                      <p style={{fontSize:'12px',color:'var(--text-secondary)',marginBottom:'10px',lineHeight:'1.5'}}>Enter your Groq API key to enable AI race predictions. Free at console.groq.com</p>
                      <input className="groq-input" type="password" placeholder="gsk_…" value={groqKey} onChange={e=>setGroqKey(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleGroqKey()}/>
                      <button className="btn btn-primary" style={{width:'100%'}} onClick={handleGroqKey} disabled={!groqKey.trim().startsWith('gsk_')}>SET KEY</button>
                    </div>
                  ) : (
                    <div>
                      <button className="btn btn-primary" style={{width:'100%',marginBottom:'12px'}} onClick={runAI} disabled={aiLoading||!weekendDataReady}>
                        {aiLoading?<><div className="spin"/>Analysing…</>:'⚡ GENERATE PREDICTIONS'}
                      </button>
                      {aiError && <div style={{color:'var(--red)',fontSize:'11px',marginBottom:'8px'}}>{aiError}</div>}
                      {predictions.map((p,i)=>(
                        <div key={i} style={{padding:'12px',background:'var(--bg-elevated)',borderRadius:'var(--radius)',marginBottom:'8px',borderLeft:`3px solid ${teamColor(p.team)}`}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}}>
                            <div>
                              <div style={{fontFamily:'var(--font-display)',fontSize:'11px',color:'var(--text-dim)',letterSpacing:'1px'}}>PREDICTED P{i+1}</div>
                              <div style={{fontFamily:'var(--font-display)',fontSize:'17px',fontWeight:800}}>{p.name}</div>
                              <div style={{fontFamily:'var(--font-display)',fontSize:'10px',color:'var(--text-secondary)'}}>{p.team}{p.gridPosition ? ` · Grid P${p.gridPosition}` : ' · Practice projection'}</div>
                            </div>
                            <div style={{textAlign:'right'}}>
                              <div style={{fontFamily:'var(--font-mono)',fontSize:'24px',fontWeight:700,color:teamColor(p.team)}}>{p.winProbability}%</div>
                              <div style={{fontFamily:'var(--font-display)',fontSize:'9px',color:'var(--text-dim)'}}>WIN PROB</div>
                            </div>
                          </div>
                          <p style={{fontSize:'12px',lineHeight:'1.55',color:'var(--text-secondary)',marginBottom:'6px'}}>{p.reasoning}</p>
                          <span className={`conf-badge conf-${p.confidence?.toLowerCase()}`}>{p.confidence}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <WeatherWidget owmKey={owmKey} setOwmKey={setOwmKey} meeting={selectedMeeting}/>
              </div>
            </div>
          )}

          {/* LIVE RACE MODE */}
          {mode==='live' && (
            <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
              {/* Live weather strip */}
              {live.weather && <WeatherStrip weather={live.weather}/>}

              {/* Enable/disable toggle */}
              <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}}>
                <button className={`btn ${liveEnabled?'btn-primary':'btn-secondary'}`} onClick={()=>setLiveEnabled(v=>!v)}>
                  {liveEnabled?'⏹ Stop Live Tracking':'▶ Start Live Tracking'}
                </button>
                {liveEnabled && <div className="live-pill"><div className="live-pill-dot"/>POLLING ACTIVE</div>}
                {/* 2026 aero notice */}
                {sessionYear >= 2026 && (
                  <span className="badge badge-red" data-tooltip="Traditional DRS replaced by active aerodynamics in 2026">
                    ⚡ Active Aero Era
                  </span>
                )}
              </div>

              <div className="two-col" style={{alignItems:'start'}}>
                <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
                  {/* Live tabs */}
                  <div className="card">
                    <div className="tabs">
                      {[['timing','Timing'],['circuit','Circuit'],['positions','Positions'],['gaps','Gaps'],['overtake','Overtake'],['telemetry','Telemetry'],['radio','Radio']].map(([k,l])=>(
                        <button key={k} className={`tab-btn ${liveTab===k?'active':''}`} onClick={()=>setLiveTab(k)}>{l}</button>
                      ))}
                    </div>
                    {liveTab==='timing'   && <TimingTower positions={live.positions} intervals={live.intervals} drivers={drivers} stints={live.stints} pits={live.pits}/>}
                    {liveTab==='circuit'  && <CircuitTracker location={live.location} positions={live.positions} drivers={drivers} practiceSession={practiceSession} enabled={liveEnabled}/>}
                    {liveTab==='positions'&& <PositionHistory positions={live.positions} drivers={drivers}/>}
                    {liveTab==='gaps'     && <GapEvolution intervals={live.intervals} drivers={drivers}/>}
                    {liveTab==='overtake' && <OvertakePanel positions={live.positions} intervals={live.intervals} drivers={drivers} stints={live.stints} carData={live.carData} sessionYear={sessionYear}/>}
                    {liveTab==='telemetry'&& <CarTelemetry carData={live.carData} drivers={drivers} positions={live.positions} sessionYear={sessionYear}/>}
                    {liveTab==='radio'    && <TeamRadio messages={live.teamRadio}/>}
                  </div>
                  <div className="card">
                    <RaceControl messages={live.raceControl}/>
                  </div>
                  <div className="card">
                    <PitTracker pits={live.pits} drivers={drivers} stints={live.stints} currentLap={live.liveLaps?.length?Math.max(...live.liveLaps.map(l=>l.lap_number||0)):0}/>
                  </div>
                </div>

                {/* Right sidebar */}
                <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
                  <LiveAnalystPanel predictions={predictions} liveProbs={liveProbs} onUpdate={runLiveUpdate} updating={liveUpdating} error={liveUpdateError} groqKeySet={groqKeySet}/>
                  <WeatherWidget owmKey={owmKey} setOwmKey={setOwmKey} meeting={selectedMeeting}/>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PATCHED APP — replaces the App in app.js to route weekend/live
// ═══════════════════════════════════════════════════════════════
function PitWallApp() {
  const [section, setSection] = React.useState('home');
  const [meetings, setMeetings] = React.useState([]);

  React.useEffect(() => {
    fetchF1('/meetings', { year: new Date().getFullYear() })
      .then(data => setMeetings(data || []))
      .catch(() => {});
  }, []);

  const renderSection = () => {
    switch(section) {
      case 'home':         return renderHome();
      case 'live':
      case 'weekend':      return React.createElement(WeekendSection, null);
      case 'circuits':     return React.createElement(CircuitsPage, null);
      case 'drivers':      return React.createElement(DriversPage, null);
      case 'constructors': return React.createElement(ConstructorsPage, null);
      case 'history':      return React.createElement(HistoryPage, null);
      case 'glossary':     return React.createElement(GlossaryPage, null);
      default:             return renderHome();
    }
  };

  const renderHome = () => React.createElement('div', null,
    React.createElement(WelcomeBanner, { setSection }),
    React.createElement('div', { className: 'two-col', style: { alignItems: 'start' } },
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '14px' } },
        React.createElement(ActiveAeroCard, null),
        React.createElement('div', { className: 'card' },
          React.createElement('div', { className: 'card-title', style: { marginBottom: '14px' } }, 'Explore'),
          React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px' } },
            [
              ['📊 Weekend Analysis', 'weekend', 'Lap times, sectors, H2H, pace progression, AI analyst'],
              ['⏺ Live Race Mode', 'weekend', 'Live timing, circuit tracker, telemetry, team radio'],
              ['🏟 Circuit Guide', 'circuits', 'All circuits — trivia, records, winning strategies'],
              ['👤 Driver Profiles', 'drivers', 'Full grid profiles and career statistics'],
              ['🔧 Constructor Guide', 'constructors', 'Team histories, stats and 2026 lineup'],
              ['📖 F1 History', 'history', 'Champions since 1950, milestones, all-time records'],
              ['💬 F1 Glossary', 'glossary', 'Every technical term explained in plain English'],
            ].map(([label, id, desc]) =>
              React.createElement('div', {
                key: label, onClick: () => setSection(id),
                style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 12px', borderRadius: 'var(--radius)', cursor: 'pointer', background: 'var(--bg-elevated)', border: '1px solid var(--border)' },
                onMouseEnter: e => { e.currentTarget.style.borderColor = 'var(--border-bright)'; },
                onMouseLeave: e => { e.currentTarget.style.borderColor = 'var(--border)'; }
              },
                React.createElement('div', null,
                  React.createElement('div', { style: { fontFamily: 'var(--font-display)', fontSize: '13px', fontWeight: 700 } }, label),
                  React.createElement('div', { style: { fontSize: '12px', color: 'var(--text-muted)', marginTop: '1px' } }, desc)
                ),
                React.createElement('span', { style: { color: 'var(--text-dim)', fontSize: '16px' } }, '›')
              )
            )
          )
        )
      ),
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '14px' } },
        React.createElement(NextRaceCountdown, { meetings }),
        React.createElement(StandingsWidget, null)
      )
    )
  );

  return React.createElement('div', { className: 'page-shell' },
    React.createElement(TopNav, { section, setSection, isLive: false }),
    React.createElement('div', { className: 'page-content' },
      renderSection()
    )
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PitWallApp, null));
</script>
