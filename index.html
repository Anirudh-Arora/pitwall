<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PITWALL — F1 Race Weekend Companion</title>
  <meta name="description" content="Your complete Formula 1 companion. Live race data, weekend analysis, circuit encyclopedia, driver profiles, constructor history, and F1 history since 1950." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- prop-types must load before Recharts (Recharts depends on it) -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- Recharts 2.13.3 — first version with full React 18 support -->
  <script src="https://unpkg.com/recharts@2.13.3/umd/Recharts.js"></script>

  <!-- Babel — only needed for companion_components.js which has real JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Load order: utils → encyclopedia → companion (JSX) → app → mount -->
  <script src="js/utils.js"></script>
  <script src="js/encyclopedia.js"></script>
  <script type="text/babel" data-presets="react" src="js/companion_components.js"></script>
  <script src="js/app.js"></script>

  <script>
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
